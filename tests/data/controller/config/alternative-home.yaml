logLevel: DEBUG
logProfile: development
lab:
  standardInithome: true
  namespacePrefix: userlabs
  emptyDirSource: disk
  enable_landing_page: true
  homeVolumeName: noplacelikehome
  sizes:
    - size: small
      resources:
        limits:
          cpu: 1.0
          memory: 3Gi
        requests:
          cpu: 0.25
          memory: 0.75Gi
  volumes:
    - name: noplacelikehome
      source:
        type: nfs
        server: 10.13.105.122
        serverPath: /share1/home
  volumeMounts:
    - containerPath: /home
      volumeName: noplacelikehome
images:
  source:
    type: docker
    registry: lighthouse.ceres
    repository: library/sketchbook
fsadmin:
  image:
    repository: ghcr.io/lsst-sqre/nublado
    tag: 10.0.0
