repos:
  - repo: builtin
    hooks:
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.8
    hooks:
      - id: uv-lock
        files: \.toml$
        types: [pyproject]
      - id: uv-lock
        alias: uv-lock-client
        name: uv-lock (client)
        files: client/pyproject.toml
        args: [--project, client]
      - id: uv-lock
        alias: uv-lock-hub
        name: uv-lock (hub)
        files: hub/pyproject.toml
        args: [--project, hub]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/adamchainz/blacken-docs
    rev: 1.20.0
    hooks:
      - id: blacken-docs
        additional_dependencies: [black==25.9.0]
        args: [-l, '79', -t, py313]
